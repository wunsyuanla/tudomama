<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1d9e75">
<title>健康管理助理</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5}
.app{max-width:420px;margin:0 auto;background:white;min-height:100vh}
.header{background:#1d9e75;color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px}
.sync{font-size:11px;background:rgba(255,255,255,0.2);padding:4px 8px;border-radius:12px}
.nav{display:flex;overflow-x:auto;border-bottom:1px solid #e5e5e5;background:white}
.nb{flex-shrink:0;padding:12px 16px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#666;font-family:inherit}
.nb.active{color:#1d9e75;border-bottom-color:#1d9e75;font-weight:600}
.tab{display:none;padding:16px}
.tab.active{display:block}
.card{background:white;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:12px}
.sec{font-size:16px;font-weight:600;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#666;margin-bottom:6px}
.field input,.field textarea{width:100%;font-size:14px;padding:10px;border:1px solid #e5e5e5;border-radius:8px;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.btn{width:100%;padding:14px;background:#1d9e75;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:#16805e}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.metric{background:#f8f9fa;border-radius:8px;padding:12px}
.ml{font-size:11px;color:#666;margin-bottom:4px}
.mv{font-size:20px;font-weight:600}
.loading{text-align:center;padding:12px;color:#666;font-size:13px;display:none}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>🧘‍♀️ 健康管理助理</h1>
  <div class="sync" id="sync">已同步</div>
</div>

<div class="nav">
  <button class="nb active" onclick="sw('log',this)">記錄</button>
  <button class="nb" onclick="sw('overview',this)">總覽</button>
  <button class="nb" onclick="sw('progress',this)">進度</button>
</div>

<div id="tab-log" class="tab active">
  <div class="card">
    <div class="sec">今日記錄</div>
    <div class="r2">
      <div class="field">
        <label>體重(kg)</label>
        <input type="number" id="weight" step="0.1" placeholder="57.0">
      </div>
      <div class="field">
        <label>體脂率(%)</label>
        <input type="number" id="bodyfat" step="0.1" placeholder="34.4">
      </div>
    </div>
    <div class="field">
      <label>早餐</label>
      <textarea id="meal1" placeholder="燕麥粥50g、水煮蛋2顆"></textarea>
    </div>
    <div class="field">
      <label>午餐</label>
      <textarea id="meal2" placeholder="雞胸肉100g、糙米半碗"></textarea>
    </div>
    <div class="field">
      <label>晚餐</label>
      <textarea id="meal3" placeholder="鮭魚100g、地瓜100g"></textarea>
    </div>
    <div class="field">
      <label>運動</label>
      <textarea id="exercise" placeholder="超慢跑30分鐘"></textarea>
    </div>
    <button class="btn" onclick="save()">送出記錄</button>
    <div class="loading" id="loading">儲存中...</div>
  </div>
</div>

<div id="tab-overview" class="tab">
  <div class="card">
    <div class="sec">目標追蹤</div>
    <div class="r2">
      <div class="metric">
        <div class="ml">目前體脂</div>
        <div class="mv">34.4%</div>
      </div>
      <div class="metric">
        <div class="ml">目標體脂</div>
        <div class="mv" style="color:#1d9e75">29%</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="sec">PWA功能展示</div>
    <p style="font-size:14px;line-height:1.6;color:#666">
      ✓ 已安裝到桌面<br>
      ✓ 可以離線使用<br>
      ✓ 全螢幕APP體驗<br>
      ✓ 資料雲端同步<br><br>
      這是簡化版展示,完整版會包含所有功能!
    </p>
  </div>
</div>

<div id="tab-progress" class="tab">
  <div class="card">
    <div class="sec">記錄歷史</div>
    <div id="history" style="font-size:13px;color:#666">
      尚無記錄,填寫後會顯示在這裡
    </div>
  </div>
</div>

</div>

<script>
let logs = [];

async function loadData() {
  try {
    const stored = localStorage.getItem('health-logs');
    if (stored) logs = JSON.parse(stored);
    renderHistory();
  } catch(e) {
    console.error('載入失敗', e);
  }
}

async function save() {
  const weight = document.getElementById('weight').value;
  const bodyfat = document.getElementById('bodyfat').value;
  const meal1 = document.getElementById('meal1').value;
  const meal2 = document.getElementById('meal2').value;
  const meal3 = document.getElementById('meal3').value;
  const exercise = document.getElementById('exercise').value;
  
  if (!meal1 && !meal2 && !meal3) {
    alert('請至少填入一餐');
    return;
  }
  
  const entry = {
    date: new Date().toLocaleDateString('zh-TW'),
    weight,
    bodyfat,
    meal1,
    meal2,
    meal3,
    exercise
  };
  
  logs.unshift(entry);
  localStorage.setItem('health-logs', JSON.stringify(logs));
  
  document.getElementById('loading').style.display = 'block';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    alert('✅ 記錄已儲存!');
    renderHistory();
    clearForm();
  }, 500);
}

function clearForm() {
  document.getElementById('weight').value = '';
  document.getElementById('bodyfat').value = '';
  document.getElementById('meal1').value = '';
  document.getElementById('meal2').value = '';
  document.getElementById('meal3').value = '';
  document.getElementById('exercise').value = '';
}

function renderHistory() {
  const hist = document.getElementById('history');
  if (logs.length === 0) {
    hist.innerHTML = '尚無記錄,填寫後會顯示在這裡';
    return;
  }
  
  hist.innerHTML = logs.map(log => `
    <div style="padding:10px 0;border-bottom:1px solid #f0f0f0">
      <div style="font-weight:600;margin-bottom:4px">${log.date}</div>
      ${log.weight ? `<div>體重: ${log.weight}kg</div>` : ''}
      ${log.bodyfat ? `<div>體脂: ${log.bodyfat}%</div>` : ''}
      ${log.exercise ? `<div>運動: ${log.exercise}</div>` : ''}
    </div>
  `).join('');
}

function sw(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'progress') renderHistory();
}

// Service Worker註冊
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log('SW已註冊'))
    .catch(err => console.log('SW註冊失敗', err));
}

loadData();
</script>
</body>
</html>
